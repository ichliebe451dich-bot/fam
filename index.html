<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1b1026;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

.title{
    position:absolute;
    top:25px;
    font-size:30px;
    letter-spacing:6px;
    opacity:0.9;
}

/* SCENE */
.scene{
    position:relative;
    width:320px;
    height:220px;
    perspective:1000px;
}

/* DOOR */
.door{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    z-index:5;
}

.panel{
    width:50%;
    height:100%;
    background:#3b2a4a;
    border:2px solid #ffffff22;
    transition:1.5s ease;
}

.left{ transform-origin:left; }
.right{ transform-origin:right; }

.scene.open .left{
    transform:rotateY(-120deg);
}
.scene.open .right{
    transform:rotateY(120deg);
}

/* ROOM */
.room{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#1a1a2e,#0f0f1a);
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:25px;
    z-index:1;
}

/* TV */
.tv{
    position:absolute;
    top:30px;
    width:130px;
    height:75px;
    background:#000;
    border:3px solid #444;
    box-shadow:0 0 10px #000;
    animation:tvGlow 2s infinite alternate;
}

@keyframes tvGlow{
    from{ box-shadow:0 0 8px #000; }
    to{ box-shadow:0 0 20px #2b2bff55; }
}

/* SOFA */
.sofa{
    width:220px;
    height:65px;
    background:#6b3f2a;
    border-radius:12px;
    position:relative;
    z-index:2;
    animation:sofaBreath 4s infinite ease-in-out;
}

@keyframes sofaBreath{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.01); }
}

/* FAMILY */
.family{
    position:absolute;
    bottom:70px;
    width:100%;
    display:flex;
    justify-content:space-around;
    z-index:3;
}

/* PERSON ANIMATION */
.person{
    text-align:center;
    font-size:18px;
    animation:idleMove 3s infinite ease-in-out;
}

.person:nth-child(2){
    animation-delay:0.5s;
}
.person:nth-child(3){
    animation-delay:1s;
}
.person:nth-child(4){
    animation-delay:1.5s;
}

@keyframes idleMove{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
}

/* blink effect for “life feel” */
.person::before{
    content:"";
    display:block;
    font-size:12px;
    animation:blink 4s infinite;
}

@keyframes blink{
    0%,92%,100%{ opacity:1; }
    94%{ opacity:0.2; }
}

/* HUSKY */
.husky{
    font-size:20px;
    animation:dogWiggle 2.5s infinite ease-in-out;
}

@keyframes dogWiggle{
    0%,100%{ transform:rotate(0deg) translateY(0); }
    50%{ transform:rotate(2deg) translateY(-3px); }
}

/* BUTTON */
button{
    margin-top:20px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ffffff15;
    color:white;
    backdrop-filter:blur(5px);
}
button:hover{
    background:#ffffff25;
}
</style>
</head>

<body>

<div class="title">US</div>

<div class="scene" id="scene">

    <!-- DOOR -->
    <div class="door">
        <div class="panel left"></div>
        <div class="panel right"></div>
    </div>

    <!-- ROOM -->
    <div class="room">

        <div class="tv"></div>

        <div class="family">
            <div class="person">👨<br>Ayah</div>
            <div class="person">👩<br>Ibu</div>
            <div class="person">👧<br>Anak</div>
            <div class="person husky">🐕‍🦺<br>Husky</div>
        </div>

        <div class="sofa"></div>

    </div>
</div>

<button onclick="document.getElementById('scene').classList.toggle('open')">
    buka pintu
</button>

</body>
</html>
